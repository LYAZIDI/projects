<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" fill="none">
  <!-- Shield/diamond leather badge -->
  <polygon points="30,4 50,14 50,38 30,52 10,38 10,14" fill="#1a1a1a" stroke="#C9A84C" stroke-width="1.5"/>
  <polygon points="30,10 44,18 44,35 30,44 16,35 16,18" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.6"/>
  <!-- L letter inside shield -->
  <text x="23" y="33" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#C9A84C" letter-spacing="1">L</text>
  <!-- Brand name -->
  <text x="62" y="28" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#1a1a1a" letter-spacing="4">LEATHERA</text>
  <!-- Tagline -->
  <text x="63" y="44" font-family="Georgia, serif" font-size="8" fill="#8B6914" letter-spacing="5">MAISON DE CUIR</text>
  <!-- Decorative lines -->
  <line x1="62" y1="48" x2="230" y2="48" stroke="#C9A84C" stroke-width="0.5" opacity="0.6"/>
</svg>
