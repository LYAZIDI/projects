spring:
  application:
    name: shopify-clone-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/shopify_clone
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: ${JWT_SECRET:your-super-secret-jwt-key-change-in-production-must-be-256-bits}
    expiration: 86400000       # 24 hours
    refresh-expiration: 604800000  # 7 days

  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:3000

  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_your_stripe_secret_key}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_your_secret}
    currency: usd

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:your_cloud}
    api-key: ${CLOUDINARY_API_KEY:your_key}
    api-secret: ${CLOUDINARY_API_SECRET:your_secret}

logging:
  level:
    com.shopifyclone: DEBUG
    org.springframework.security: INFO
