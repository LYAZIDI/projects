spring:
  application:
    name: workflow-platform

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/workflow_platform}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10        # Neon pooler recommande ≤ 10 connexions par instance
      minimum-idle: 2
      connection-timeout: 30000
      keepalive-time: 60000        # évite que le pooler Neon ferme les connexions idle
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: public
        envers:
          audit_table_suffix: _audit
          revision_on_collection_change: true
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    url: ${DB_URL:jdbc:postgresql://localhost:5432/workflow_platform}
    user: ${DB_USER:postgres}
    password: ${DB_PASS:}

  cache:
    type: simple  # swap to redis in production

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# ── App config (security + auth provider + workflow engine) ───────────────────
app:

  # ── Security / JWT ──────────────────────────────────────────────────────────
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-production-use-env-variable-min-256-bits}
      access-token-expiry-ms: 3600000       # 1h
      refresh-token-expiry-ms: 604800000    # 7d
    cors:
      allowed-origins: ${CORS_ORIGINS:http://localhost:4200}

  # ── Auth Provider ────────────────────────────────────────────────────────────
  # provider: internal (default) — notre AuthController émet les tokens
  # provider: oidc               — serveur d'auth externe (Keycloak, Azure AD, Okta…)
  #
  # Exemple Keycloak :
  #   provider: oidc
  #   oidc:
  #     issuer-uri: https://keycloak.client.com/realms/production
  #     claims-mapping:
  #       tenant-id-claim:    tenant_id
  #       roles-claim:        realm_access.roles
  #       permissions-claim:  realm_access.roles
  #
  # Exemple Azure AD :
  #   provider: oidc
  #   oidc:
  #     issuer-uri: https://login.microsoftonline.com/{tenant-id}/v2.0
  #     claims-mapping:
  #       user-id-claim:    oid
  #       email-claim:      upn
  #       tenant-id-claim:  extension_tenantId
  #       permissions-claim: roles
  auth:
    provider: internal
    oidc:
      issuer-uri: ${OIDC_ISSUER_URI:}
      claims-mapping:
        user-id-claim:       sub
        email-claim:         email
        tenant-id-claim:     tenant_id
        roles-claim:         roles
        permissions-claim:   permissions

  # ── Workflow Engine ──────────────────────────────────────────────────────────
  workflow:
    definition-cache-ttl-seconds: 300
    max-conditions-per-transition: 20
    max-actions-per-transition: 20

  # ── Clinic Module ────────────────────────────────────────────────────────────
  clinic:
    demo-tenant-id: ${CLINIC_DEMO_TENANT_ID:00000000-0000-0000-0000-000000000001}

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

# ── OpenAPI ───────────────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

logging:
  level:
    com.platform.workflow: DEBUG
    org.springframework.security: INFO
